name: 'CI Pipeline'
on:
  push:
    branches: [main, beta]
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build:release
      - uses: actions/upload-artifact@v4
        with:
          name: widget-dist
          path: packages/login-widget/dist/*

  bff-e2e:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(pnpm --filter @forgerock/login-app exec playwright --version)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-bff-${{ steps.playwright-version.outputs.version }}
      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @forgerock/login-app exec playwright install chromium
      - name: Install Playwright system dependencies
        run: pnpm --filter @forgerock/login-app exec playwright install-deps chromium

      - uses: actions/download-artifact@v4
        with:
          name: widget-dist
          path: packages/login-widget/dist
      - name: Build login-app (adapter-node)
        run: PREVIEW=true pnpm --filter @forgerock/login-app run build

      - name: BFF E2E tests
        run: pnpm --filter @forgerock/login-app exec playwright test --config playwright.bff.config.ts --project chromium-js --project chromium-nojs

  e2e:
    needs: [build]
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]
    runs-on: ${{ matrix.os }}
    env:
      VITE_FR_AM_URL: ${{ secrets.VITE_FR_AM_URL }}
      VITE_FR_AM_COOKIE_NAME: ${{ secrets.VITE_FR_AM_COOKIE_NAME }}
      VITE_FR_OAUTH_PUBLIC_CLIENT: ${{ secrets.VITE_FR_OAUTH_PUBLIC_CLIENT }}
      VITE_FR_REALM_PATH: ${{ secrets.VITE_FR_REALM_PATH }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      # Cache Playwright browser binaries between runs (~200MB for Chromium)
      # playwright is a devDependency of the e2e workspace, so commands must be scoped
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(pnpm --filter @forgerock/login-widget-e2e exec playwright --version)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}
      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @forgerock/login-widget-e2e exec playwright install chromium
      - name: Install Playwright system dependencies
        if: runner.os == 'Linux'
        run: pnpm --filter @forgerock/login-widget-e2e exec playwright install-deps chromium

      - uses: actions/download-artifact@v4
        with:
          name: widget-dist
          path: packages/login-widget/dist
      - run: pnpm --filter @forgerock/login-app run build
      - name: e2e
        run: pnpm --filter @forgerock/login-widget-e2e exec playwright test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
      - name: Upload blob report to GitHub Actions Artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ runner.os }}-${{ matrix.shardIndex }}
          path: e2e/blob-report
          if-no-files-found: ignore
          retention-days: 1

  merge-e2e-report:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    if: always()
    needs: [e2e]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: Download blob reports from GitHub Actions Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports
          pattern: blob-report-${{ runner.os }}-*
          merge-multiple: true

      - name: Merge into HTML Report
        run: |
          if [ -d all-blob-reports ] && [ "$(ls -A all-blob-reports 2>/dev/null)" ]; then
            pnpm --filter @forgerock/login-widget-e2e exec playwright merge-reports --config=merge.config.ts ../all-blob-reports
          else
            echo "No blob reports found — skipping merge"
          fi

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: html-report--attempt--${{ runner.os }}-${{ github.run_attempt }}
          path: e2e/playwright-report
          retention-days: 14

  test-lint-storybook-build:
    runs-on: ubuntu-latest
    env:
      VITE_FR_AM_URL: ${{ secrets.VITE_FR_AM_URL }}
      VITE_FR_AM_COOKIE_NAME: ${{ secrets.VITE_FR_AM_COOKIE_NAME }}
      VITE_FR_OAUTH_PUBLIC_CLIENT: ${{ secrets.VITE_FR_OAUTH_PUBLIC_CLIENT }}
      VITE_FR_REALM_PATH: ${{ secrets.VITE_FR_REALM_PATH }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run check:lint
      - run: pnpm run test
      - name: Server unit tests
        run: pnpm --filter login-app exec svelte-kit sync && pnpm --filter login-app run test:run
      - name: Install Playwright for Storybook tests
        run: pnpm --filter @forgerock/login-widget exec playwright install --with-deps chromium
      - name: Build Storybook
        run: pnpm run build:storybook --quiet
      - name: Serve Storybook and run tests
        run: |
          pnpm exec concurrently -k -s first -n "SB,TEST" -c "magenta,blue" \
            "pnpm exec http-server storybook-static --port 6006 --silent" \
            "pnpm exec wait-on tcp:6006 && pnpm run test:storybook"

  chromatic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Chromatic needs full git history for onlyChanged
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - uses: chromaui/action@latest
        with:
          onlyChanged: true
          exitOnceUploaded: true
          traceChanged: true
          diagnosticsFile: chromatic-diagnostics.json
          buildScriptName: 'build:storybook'
          exitZeroOnChanges: true
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: chromatic-build-artifacts-${{ github.run_id }}
          path: |
            chromatic-diagnostics.json
            **/build-storybook.log

  bff-e2e-browserstack:
    name: 'BFF E2E (BrowserStack)'
    needs: [build]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    env:
      BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
      BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: Start BrowserStack Local Tunnel
        uses: browserstack/github-actions/setup-local@master
        with:
          local-testing: start
          local-logging-level: 1

      - uses: actions/download-artifact@v4
        with:
          name: widget-dist
          path: packages/login-widget/dist

      - name: Build login-app
        run: PREVIEW=true pnpm --filter @forgerock/login-app run build

      - name: Run BFF E2E on BrowserStack
        run: pnpm --filter @forgerock/login-app run test:e2e:bff:browserstack
        env:
          BROWSERSTACK_BUILD_NAME: bff-e2e-${{ github.run_id }}

      - name: Stop BrowserStack Local Tunnel
        if: always()
        uses: browserstack/github-actions/setup-local@master
        with:
          local-testing: stop

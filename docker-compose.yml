services:
  preview:
    build:
      context: .
      dockerfile: Dockerfile
      target: deploy
      args:
        VITE_FR_AM_URL: ${VITE_FR_AM_URL}
        VITE_FR_AM_COOKIE_NAME: ${VITE_FR_AM_COOKIE_NAME}
        VITE_FR_OAUTH_PUBLIC_CLIENT: ${VITE_FR_OAUTH_PUBLIC_CLIENT}
        VITE_FR_REALM_PATH: ${VITE_FR_REALM_PATH}
    env_file:
      - .env
    environment:
      - ORIGIN=http://localhost:3000
    ports:
      - 3000:3000

  e2e:
    build:
      context: .
      dockerfile: Dockerfile
      target: e2e
    depends_on:
      preview:
        condition: service_healthy
    # Use host networking so the browser's origin is http://localhost:3000,
    # matching the AM server's CORS allowlist.
    network_mode: host
    env_file:
      - .env
    environment:
      - PLAYWRIGHT_TEST_BASE_URL=http://localhost:3000
    tty: false
    profiles:
      - test
